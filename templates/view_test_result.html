{% extends "base.html" %}

{% block title %}View Test Result - Personalized Education Platform{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                    <h5><i class="fas fa-file-alt"></i> {{ filename }}</h5>
                    <a href="{{ url_for('test_results') }}" class="btn btn-sm btn-light">
                        <i class="fas fa-arrow-left"></i> Back to Results
                    </a>
                </div>
                <div class="card-body">
                    <pre style="white-space: pre-wrap; font-family: 'Courier New', monospace; background-color: #f8f9fa; padding: 20px; border-radius: 5px; overflow-x: auto;">{{ content }}</pre>
                </div>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="{{ url_for('test_results') }}" class="btn btn-outline-primary">
            <i class="fas fa-arrow-left"></i> Back to All Results
        </a>
        <a href="{{ url_for('dashboard') }}" class="btn btn-outline-secondary">
            <i class="fas fa-home"></i> Go to Dashboard
        </a>
    </div>
</div>
{% endblock %}
